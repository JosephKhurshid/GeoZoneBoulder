version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:projectDTCGeography@db:5432/geozone
      - REDIS_URL=redis://redis:6379/0

  db:
    image: postgis/postgis:15-3.3-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: projectDTCGeography
      POSTGRES_DB: geozone
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgis_data: